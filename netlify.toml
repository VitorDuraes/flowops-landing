# Deploy do WaveOps Portal (Next.js 15) no Netlify free.
# O app vive em portal/. A landing (index.html + assets/ na raiz do repo) e copiada
# para portal/public/ pelo prebuild (scripts/sync-landing.mjs) e servida em "/" via
# rewrite do next.config.mjs. Mesma origem para landing, checkout, /cliente, /admin
# e os webhooks. Runbook completo em docs/deploy-netlify-supabase.md.
[build]
  base = "portal"
  command = "npm run build"
  # O Next Runtime publica a pasta .next. No netlify.toml o publish e relativo ao
  # BASE ("portal"), entao o valor correto e ".next" (resolve para portal/.next).
  # Nao pode ser igual ao base, nem "portal/.next" (viraria portal/portal/.next).
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

# Runtime oficial do Next no Netlify (App Router + funcoes Node, runtime Node).
[[plugins]]
  package = "@netlify/plugin-nextjs"
